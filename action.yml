name: 'Konata Deploy'
description: 'Detect changed challenges and sync them with konata'

inputs:
  deploy-directory:
    description: 'Root directory containing kona config and challenges'
    required: false
    default: '.'
  base-ref:
    description: 'Base ref to diff against (auto-detected from event if omitted)'
    required: false
    default: ''
  python-version:
    description: 'Python version to use'
    required: false
    default: '3.14'
  konata-version:
    description: 'Konata package specifier for pip install'
    required: false
    default: 'konata'
  extra-args:
    description: 'Extra arguments to pass to kona sync'
    required: false
    default: ''

outputs:
  changed-challenges:
    description: 'Space-separated list of challenge directories that were synced'
    value: ${{ steps.detect.outputs.challenges }}
  global-config-changed:
    description: 'Whether a root kona config file changed'
    value: ${{ steps.detect.outputs.global_changed }}

runs:
  using: 'composite'
  steps:
    - name: Install uv
      uses: astral-sh/setup-uv@v7
      with:
        python-version: ${{ inputs.python-version }}

    - name: Detect changed challenges
      id: detect
      shell: bash
      env:
        INPUT_DEPLOY_DIRECTORY: ${{ inputs.deploy-directory }}
        INPUT_BASE_REF: ${{ inputs.base-ref }}
        GITHUB_EVENT_BEFORE: ${{ github.event.before }}
      run: bash ${{ github.action_path }}/scripts/detect-challenges.sh

    - name: Sync challenges
      if: steps.detect.outputs.should_sync == 'true'
      shell: bash
      env:
        DEPLOY_DIRECTORY: ${{ inputs.deploy-directory }}
        ONLY_FLAGS: ${{ steps.detect.outputs.only_flags }}
        EXTRA_ARGS: ${{ inputs.extra-args }}
        UV_PYTHON: ${{ inputs.python-version }}
      run: uvx --python "$UV_PYTHON" --from "${{ inputs.konata-version }}" kona sync -d "$DEPLOY_DIRECTORY" $ONLY_FLAGS $EXTRA_ARGS
